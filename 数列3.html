<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>等差数列 インタラクティブ解説</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:linear-gradient(135deg,#0984e3,#74b9ff);min-height:100vh;padding:16px;color:#333}
h1{text-align:center;color:#fff;font-size:1.7em;text-shadow:0 2px 8px rgba(0,0,0,.25);margin-bottom:4px}
.sub{text-align:center;color:rgba(255,255,255,.9);margin-bottom:16px;font-size:.95em}
.tabs{display:flex;gap:0;max-width:960px;margin:0 auto}
.tab{flex:1;padding:13px 6px;text-align:center;font-weight:700;font-size:.85em;cursor:pointer;border-radius:14px 14px 0 0;transition:.3s;background:rgba(255,255,255,.45);color:#555}
.tab.on{background:#fff;color:#0984e3}
.card{background:#fff;border-radius:0 0 20px 20px;box-shadow:0 10px 40px rgba(0,0,0,.15);padding:20px;max-width:960px;margin:0 auto 20px}
.card-title{font-size:1.1em;font-weight:700;color:#0984e3;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.badge{background:linear-gradient(135deg,#0984e3,#74b9ff);color:#fff;padding:3px 12px;border-radius:16px;font-size:.7em}
.tc{display:none}.tc.on{display:block}

/* Number line / sequence display */
.seq-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:14px 0;align-items:flex-end}
.num-box{min-width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.15em;font-weight:800;border:2px solid transparent;position:relative;transition:.25s;background:#e3f2fd;color:#1565c0;padding:0 6px}
.num-box .idx{position:absolute;top:-16px;font-size:.6em;font-weight:600;color:#999}
.num-box.hi{transform:scale(1.2);box-shadow:0 3px 14px rgba(0,0,0,.25);border-color:#0984e3;z-index:2;background:#0984e3;color:#fff}
.num-box.target{border-color:#e74c3c;border-width:3px;background:#ffeaa7;color:#d63031}
.num-box.range{background:#55efc4;color:#00695c;border-color:#00b894}
.plus-arrow{color:#e17055;font-weight:700;font-size:.75em;display:flex;align-items:center;padding:0 1px}

/* Controls */
.ctrl{text-align:center;margin:14px 0}
.ctrl label{font-weight:700;color:#0984e3;font-size:1em}
.ctrl input[type=range]{width:60%;accent-color:#0984e3;vertical-align:middle}
.ctrl .val{font-weight:800;font-size:1.4em;color:#0984e3;margin-left:6px}
.btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0}
.btn{padding:9px 16px;border-radius:22px;border:2px solid #ddd;background:#fff;font-weight:700;font-size:.88em;cursor:pointer;transition:.2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.btn.on{border-color:#0984e3;background:#e3f2fd;color:#0984e3}

/* Info cards */
.info-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin:12px 0}
.info-card{border-radius:12px;padding:10px;text-align:center;border:2px solid #eee}
.info-card .lbl{font-size:.72em;color:#888;margin-bottom:2px}
.info-card .val{font-size:1.4em;font-weight:800}

/* Explanation */
.exp{margin-top:12px;background:#e8f4fd;border-left:5px solid #0984e3;border-radius:0 12px 12px 0;padding:12px 16px;font-size:.93em;line-height:1.8;color:#2c3e50}
.exp b{color:#0984e3}
.step{margin-bottom:5px}
.sn{display:inline-block;background:#0984e3;color:#fff;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:.75em;font-weight:700;margin-right:5px}

/* Quiz */
.quiz-box{background:#f0f8ff;border:2px solid #74b9ff;border-radius:14px;padding:16px;margin:10px 0;text-align:center}
.quiz-q{font-weight:700;font-size:1.05em;margin-bottom:10px;color:#2c3e50}
.quiz-input{width:80px;height:44px;border:3px solid #0984e3;border-radius:10px;font-size:1.3em;font-weight:700;text-align:center;color:#0984e3;outline:none;background:#fff}
.quiz-input:focus{border-color:#e17055;background:#fff3e0;color:#e17055}
.quiz-btn{padding:8px 22px;border-radius:20px;border:none;background:linear-gradient(135deg,#0984e3,#74b9ff);color:#fff;font-weight:700;font-size:.95em;cursor:pointer;margin-left:8px}
.quiz-result{margin-top:8px;font-weight:700;font-size:1em;min-height:24px}
.quiz-result.ok{color:#27ae60}.quiz-result.ng{color:#e74c3c}

/* Gauss visualization */
.gauss-row{display:flex;justify-content:center;gap:3px;margin:6px 0}
.gauss-cell{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1em;transition:.3s}
.gauss-fwd{background:#e3f2fd;color:#1565c0;border:2px solid #90caf9}
.gauss-rev{background:#fce4ec;color:#c62828;border:2px solid #ef9a9a}
.gauss-sum{background:#e8f5e9;color:#2e7d32;border:2px solid #a5d6a7;font-size:.85em}
.gauss-pair-line{text-align:center;font-size:1.8em;color:#999;margin:2px 0;letter-spacing:6px}
.gauss-eq{text-align:center;font-weight:700;font-size:1.1em;margin:10px 0;color:#2c3e50;line-height:1.8}
.gauss-eq b{color:#0984e3;font-size:1.2em}
.gauss-eq .ans{color:#c62828;font-weight:800;font-size:1.3em}

/* Calc display */
.calc{background:#f8f9fa;border-radius:12px;padding:14px;margin:10px 0;text-align:center;font-size:1.05em;line-height:2}
.calc b{color:#0984e3;font-size:1.15em}
.calc .ans{color:#c62828;font-weight:800;font-size:1.3em}

/* Formula box */
.formula-box{background:linear-gradient(135deg,#fff9c4,#fff59d);border:3px solid #f9a825;border-radius:16px;padding:16px;text-align:center;margin:14px 0;font-size:1.15em;font-weight:700;color:#e65100}
.formula-box .big{font-size:1.5em;color:#c62828;display:block;margin-top:6px}

/* Mode selector */
.mode-sel{display:flex;gap:6px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.mode-btn{padding:8px 14px;border-radius:18px;border:2px solid #b0bec5;background:#fff;font-weight:600;font-size:.85em;cursor:pointer;transition:.2s}
.mode-btn.on{border-color:#0984e3;background:#0984e3;color:#fff}

/* Score */
.score-bar{display:flex;justify-content:center;gap:16px;margin:10px 0;font-weight:700;font-size:1em}
.score-bar .correct{color:#27ae60}.score-bar .wrong{color:#e74c3c}
</style>
</head>
<body>

<h1>等差数列のきまりと和</h1>
<p class="sub">N番目の数を求める公式と、ガウスの足し算を学ぼう！</p>

<div class="tabs" id="tabs"></div>
<div class="card">
<div class="tc on" id="t0"></div>
<div class="tc" id="t1"></div>
<div class="tc" id="t2"></div>
</div>

<script>
// ===== TAB SYSTEM =====
const tabNames=['N番目の数','等差数列の和','クイズ'];
const tabsEl=document.getElementById('tabs');
tabNames.forEach((n,i)=>{
  const d=document.createElement('div');
  d.className='tab'+(i===0?' on':'');
  d.textContent=n;
  d.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    d.classList.add('on');
    document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));
    document.getElementById('t'+i).classList.add('on');
  };
  tabsEl.appendChild(d);
});

// ===== HELPER: nth term =====
function nthTerm(first,diff,n){return first+(n-1)*diff;}
function posOf(first,diff,val){return (val-first)%diff===0?(val-first)/diff+1:-1;}
function countBetween(first,diff,a,b){
  let pa=posOf(first,diff,a), pb=posOf(first,diff,b);
  if(pa<0||pb<0)return-1;
  return pb-pa+1;
}
function gaussSum(first,last,count){return (first+last)*count/2;}

// ===== TAB 0: N番目の数 =====
(function(){
  const el=document.getElementById('t0');
  const FIRST=2, DIFF=3;
  let mode='nth'; // nth, reverse, count
  let sliderVal=10;

  function render(){
    let html=`<div class="card-title">📐 等差数列　2, 5, 8, 11, 14, 17, ... <span class="badge">公差 +3</span></div>`;

    // Mode selector
    html+=`<div class="mode-sel">
      <div class="mode-btn${mode==='nth'?' on':''}" onclick="t0mode('nth')">N番目の数を求める</div>
      <div class="mode-btn${mode==='reverse'?' on':''}" onclick="t0mode('reverse')">何番目か求める</div>
      <div class="mode-btn${mode==='count'?' on':''}" onclick="t0mode('count')">間の個数を数える</div>
    </div>`;

    if(mode==='nth'){
      html+=`<div class="ctrl"><label>N = </label>
        <input type="range" min="1" max="40" value="${sliderVal}" oninput="t0slide(this.value)">
        <span class="val">${sliderVal}</span></div>`;

      const val=nthTerm(FIRST,DIFF,sliderVal);
      // Show sequence
      const showCount=Math.min(sliderVal,20);
      html+=`<div class="seq-row">`;
      for(let i=1;i<=showCount;i++){
        const v=nthTerm(FIRST,DIFF,i);
        const cls=i===sliderVal?'num-box hi':(i<sliderVal?'num-box':'num-box');
        html+=`<div class="${cls}"><span class="idx">${i}番目</span>${v}</div>`;
        if(i<showCount)html+=`<div class="plus-arrow">+3</div>`;
      }
      if(sliderVal>20)html+=`<div class="plus-arrow">…</div><div class="num-box hi"><span class="idx">${sliderVal}番目</span>${val}</div>`;
      html+=`</div>`;

      // Info cards
      html+=`<div class="info-row">
        <div class="info-card" style="border-color:#74b9ff"><div class="lbl">はじめの数</div><div class="val" style="color:#0984e3">${FIRST}</div></div>
        <div class="info-card" style="border-color:#fdcb6e"><div class="lbl">公差（差）</div><div class="val" style="color:#e17055">${DIFF}</div></div>
        <div class="info-card" style="border-color:#55efc4"><div class="lbl">${sliderVal}番目の数</div><div class="val" style="color:#00b894">${val}</div></div>
      </div>`;

      // Explanation
      html+=`<div class="exp">
        <div class="step"><span class="sn">1</span><b>${sliderVal}番目</b>ということは、公差を <b>${sliderVal} − 1 = ${sliderVal-1}回</b> たす</div>
        <div class="step"><span class="sn">2</span>公差 × 回数 = <b>${DIFF} × ${sliderVal-1} = ${DIFF*(sliderVal-1)}</b></div>
        <div class="step"><span class="sn">3</span>はじめの数 + それ = <b>${FIRST} + ${DIFF*(sliderVal-1)} = ${val}</b></div>
      </div>`;

      // Formula
      html+=`<div class="formula-box">N番目の数 = はじめの数 +（N − 1）× 公差<span class="big">${FIRST} +（${sliderVal} − 1）× ${DIFF} = ${val}</span></div>`;

    } else if(mode==='reverse'){
      html+=`<div class="ctrl"><label>数 = </label>
        <input type="range" min="2" max="300" step="3" value="${sliderVal}" oninput="t0slide(this.value)">
        <span class="val">${sliderVal}</span></div>`;

      const pos=posOf(FIRST,DIFF,parseInt(sliderVal));
      const valid=pos>0;

      if(valid){
        const showStart=Math.max(1,pos-4), showEnd=Math.min(pos+3,pos);
        html+=`<div class="seq-row">`;
        if(showStart>1)html+=`<div class="plus-arrow">…</div>`;
        for(let i=showStart;i<=Math.min(pos,pos);i++){
          const v=nthTerm(FIRST,DIFF,i);
          const cls=i===pos?'num-box target':'num-box';
          html+=`<div class="${cls}"><span class="idx">${i}番目</span>${v}</div>`;
          if(i<pos)html+=`<div class="plus-arrow">+3</div>`;
        }
        html+=`</div>`;

        html+=`<div class="info-row">
          <div class="info-card" style="border-color:#e74c3c"><div class="lbl">この数</div><div class="val" style="color:#e74c3c">${sliderVal}</div></div>
          <div class="info-card" style="border-color:#55efc4"><div class="lbl">何番目？</div><div class="val" style="color:#00b894">${pos}番目</div></div>
        </div>`;

        html+=`<div class="exp">
          <div class="step"><span class="sn">1</span>はじめの数との差：<b>${sliderVal} − ${FIRST} = ${sliderVal-FIRST}</b></div>
          <div class="step"><span class="sn">2</span>公差で割る：<b>${sliderVal-FIRST} ÷ ${DIFF} = ${(sliderVal-FIRST)/DIFF}</b>回</div>
          <div class="step"><span class="sn">3</span>1を足す：<b>${(sliderVal-FIRST)/DIFF} + 1 = ${pos}番目</b></div>
        </div>`;

        html+=`<div class="formula-box">何番目 =（数 − はじめの数）÷ 公差 + 1<span class="big">（${sliderVal} − ${FIRST}）÷ ${DIFF} + 1 = ${pos}番目</span></div>`;
      }

    } else { // count
      // Show range between two values
      const aVal=86, bVal=236;
      const pa=posOf(FIRST,DIFF,aVal), pb=posOf(FIRST,DIFF,bVal);
      const cnt=pb-pa+1;

      html+=`<p style="text-align:center;font-weight:700;font-size:1.05em;margin:10px 0;color:#5d4037">
        数列 2, 5, 8, 11, ... の中で、<span style="color:#e74c3c">${aVal}</span> から <span style="color:#e74c3c">${bVal}</span> までに何この数がある？</p>`;

      // Show some numbers around the range
      html+=`<div class="seq-row">`;
      html+=`<div class="plus-arrow">…</div>`;
      for(let i=pa-1;i<=pa+2;i++){
        if(i<1)continue;
        const v=nthTerm(FIRST,DIFF,i);
        const cls=(i>=pa&&i<=pb)?'num-box range':'num-box';
        html+=`<div class="${cls}"><span class="idx">${i}番目</span>${v}</div>`;
        html+=`<div class="plus-arrow">+3</div>`;
      }
      html+=`<div class="plus-arrow">…</div>`;
      for(let i=pb-2;i<=pb+1;i++){
        const v=nthTerm(FIRST,DIFF,i);
        const cls=(i>=pa&&i<=pb)?'num-box range':'num-box';
        html+=`<div class="${cls}"><span class="idx">${i}番目</span>${v}</div>`;
        if(i<pb+1)html+=`<div class="plus-arrow">+3</div>`;
      }
      html+=`</div>`;

      html+=`<div class="info-row">
        <div class="info-card" style="border-color:#e74c3c"><div class="lbl">${aVal}は</div><div class="val" style="color:#e74c3c">${pa}番目</div></div>
        <div class="info-card" style="border-color:#e74c3c"><div class="lbl">${bVal}は</div><div class="val" style="color:#e74c3c">${pb}番目</div></div>
        <div class="info-card" style="border-color:#00b894"><div class="lbl">間の個数</div><div class="val" style="color:#00b894">${cnt}こ</div></div>
      </div>`;

      html+=`<div class="exp">
        <div class="step"><span class="sn">1</span><b>${aVal}</b>は何番目？ →（${aVal} − ${FIRST}）÷ ${DIFF} + 1 = <b>${pa}番目</b></div>
        <div class="step"><span class="sn">2</span><b>${bVal}</b>は何番目？ →（${bVal} − ${FIRST}）÷ ${DIFF} + 1 = <b>${pb}番目</b></div>
        <div class="step"><span class="sn">3</span>個数 = ${pb} − ${pa} + 1 = <b>${cnt}こ</b></div>
      </div>`;

      html+=`<div class="formula-box">間の個数 = 最後の番目 − 最初の番目 + 1<span class="big">${pb} − ${pa} + 1 = ${cnt}こ</span></div>`;
    }

    el.innerHTML=html;
  }

  window.t0mode=function(m){mode=m;sliderVal=(m==='nth'?10:m==='reverse'?86:86);render();};
  window.t0slide=function(v){sliderVal=parseInt(v);render();};
  render();
})();

// ===== TAB 1: ガウスの和 =====
(function(){
  const el=document.getElementById('t1');
  let gaussN=5;
  let showStep=0; // 0=initial, 1=reverse, 2=pairs, 3=sum, 4=divide

  function render(){
    let html=`<div class="card-title">✨ 等差数列の和（ガウスの方法）<span class="badge">ペアリング</span></div>`;

    html+=`<div class="ctrl"><label>1 から </label>
      <input type="range" min="2" max="20" value="${gaussN}" oninput="t1slide(this.value)">
      <span class="val">${gaussN}</span><label> までの和</label></div>`;

    html+=`<div class="mode-sel">
      <div class="mode-btn${showStep>=0?' on':''}" onclick="t1step(0)">①ならべる</div>
      <div class="mode-btn${showStep>=1?' on':''}" onclick="t1step(1)">②逆にならべる</div>
      <div class="mode-btn${showStep>=2?' on':''}" onclick="t1step(2)">③ペアの和</div>
      <div class="mode-btn${showStep>=3?' on':''}" onclick="t1step(3)">④合計</div>
      <div class="mode-btn${showStep>=4?' on':''}" onclick="t1step(4)">⑤÷2で答え</div>
    </div>`;

    // Forward row
    const nums=[];for(let i=1;i<=gaussN;i++)nums.push(i);
    const rev=[...nums].reverse();
    const pairSum=1+gaussN;

    html+=`<div style="margin:16px 0">`;
    // Row 1: forward
    html+=`<div style="text-align:center;font-weight:600;color:#1565c0;margin-bottom:4px">じゅんばんに</div>`;
    html+=`<div class="gauss-row">`;
    nums.forEach(n=>{html+=`<div class="gauss-cell gauss-fwd">${n}</div>`;});
    html+=`</div>`;

    if(showStep>=1){
      // Row 2: reverse
      html+=`<div style="text-align:center;font-weight:600;color:#c62828;margin:8px 0 4px">＋）逆から</div>`;
      html+=`<div class="gauss-row">`;
      rev.forEach(n=>{html+=`<div class="gauss-cell gauss-rev">${n}</div>`;});
      html+=`</div>`;
    }

    if(showStep>=2){
      // Pair lines
      html+=`<div class="gauss-pair-line">`;
      for(let i=0;i<gaussN;i++)html+='─';
      html+=`</div>`;
      // Sum row
      html+=`<div class="gauss-row">`;
      nums.forEach(()=>{html+=`<div class="gauss-cell gauss-sum">${pairSum}</div>`;});
      html+=`</div>`;
      html+=`<div style="text-align:center;color:#2e7d32;font-weight:700;margin-top:4px">
        すべてのペアが <b>${pairSum}</b> になる！</div>`;
    }

    html+=`</div>`;

    if(showStep>=3){
      const total2=pairSum*gaussN;
      html+=`<div class="gauss-eq">
        ペアの合計 = <b>${pairSum}</b> × <b>${gaussN}</b> = <b>${total2}</b>
      </div>`;

      if(showStep>=4){
        const answer=total2/2;
        html+=`<div class="gauss-eq">
          でも2列分なので ÷ 2 → <b>${total2}</b> ÷ 2 = <span class="ans">${answer}</span>
        </div>`;

        html+=`<div class="formula-box">
          等差数列の和 =（はじめ ＋ おわり）× 個数 ÷ 2
          <span class="big">（${nums[0]} ＋ ${gaussN}）× ${gaussN} ÷ 2 = ${answer}</span>
        </div>`;

        // Verification: show actual sum
        const actualSum=nums.reduce((a,b)=>a+b,0);
        html+=`<div class="exp">
          <div class="step"><span class="sn">✓</span>たしかめ：${nums.join(' + ')} = <b>${actualSum}</b> ✅</div>
        </div>`;
      }
    }

    // General formula section
    html+=`<div style="margin-top:20px;border-top:2px dashed #ddd;padding-top:16px">`;
    html+=`<div class="card-title">📝 一般の等差数列の和</div>`;

    html+=`<div class="ctrl"><label>はじめ </label>
      <input type="number" value="${gFirst}" min="1" max="100" style="width:60px;text-align:center;font-size:1.1em;font-weight:700;border:2px solid #0984e3;border-radius:8px" oninput="t1gen('f',this.value)">
      <label>　公差 </label>
      <input type="number" value="${gDiff}" min="1" max="20" style="width:60px;text-align:center;font-size:1.1em;font-weight:700;border:2px solid #e17055;border-radius:8px" oninput="t1gen('d',this.value)">
      <label>　個数 </label>
      <input type="number" value="${gCount}" min="1" max="50" style="width:60px;text-align:center;font-size:1.1em;font-weight:700;border:2px solid #00b894;border-radius:8px" oninput="t1gen('c',this.value)">
    </div>`;

    const gLast=gFirst+(gCount-1)*gDiff;
    const gSum=(gFirst+gLast)*gCount/2;

    // Show first few terms
    const showN=Math.min(gCount,8);
    html+=`<div class="seq-row">`;
    for(let i=0;i<showN;i++){
      const v=gFirst+i*gDiff;
      html+=`<div class="num-box">${v}</div>`;
      if(i<showN-1)html+=`<div class="plus-arrow">+${gDiff}</div>`;
    }
    if(gCount>8)html+=`<div class="plus-arrow">…</div><div class="num-box">${gLast}</div>`;
    html+=`</div>`;

    html+=`<div class="info-row">
      <div class="info-card" style="border-color:#74b9ff"><div class="lbl">はじめ</div><div class="val" style="color:#0984e3">${gFirst}</div></div>
      <div class="info-card" style="border-color:#e74c3c"><div class="lbl">おわり</div><div class="val" style="color:#e74c3c">${gLast}</div></div>
      <div class="info-card" style="border-color:#fdcb6e"><div class="lbl">個数</div><div class="val" style="color:#e17055">${gCount}</div></div>
      <div class="info-card" style="border-color:#55efc4"><div class="lbl">和</div><div class="val" style="color:#00b894">${gSum}</div></div>
    </div>`;

    html+=`<div class="calc">（<b>${gFirst}</b> ＋ <b>${gLast}</b>）× <b>${gCount}</b> ÷ 2 = <span class="ans">${gSum}</span></div>`;

    html+=`</div>`;

    el.innerHTML=html;
  }

  let gFirst=2, gDiff=3, gCount=10;
  window.t1slide=function(v){gaussN=parseInt(v);render();};
  window.t1step=function(s){showStep=s;render();};
  window.t1gen=function(k,v){
    v=parseInt(v)||1;
    if(k==='f')gFirst=v;
    if(k==='d')gDiff=Math.max(1,v);
    if(k==='c')gCount=Math.max(1,Math.min(50,v));
    render();
  };
  render();
})();

// ===== TAB 2: QUIZ =====
(function(){
  const el=document.getElementById('t2');

  // Questions from page 3 and page 4
  const qs=[
    // Page 3: sequence 2,5,8,11... (+3)
    {q:'数列 2, 5, 8, 11, ... で、<b>10番目</b>の数は？',ans:29,
     hint:'2 +（10−1）× 3 = 2 + 27 = 29',unit:''},
    {q:'数列 2, 5, 8, 11, ... で、<b>35番目</b>の数は？',ans:104,
     hint:'2 +（35−1）× 3 = 2 + 102 = 104',unit:''},
    {q:'数列 2, 5, 8, 11, ... で、<b>86</b>は何番目？',ans:29,
     hint:'（86 − 2）÷ 3 + 1 = 84 ÷ 3 + 1 = 29番目',unit:'番目'},
    {q:'数列 2, 5, 8, 11, ... で、<b>236</b>は何番目？',ans:79,
     hint:'（236 − 2）÷ 3 + 1 = 234 ÷ 3 + 1 = 79番目',unit:'番目'},
    {q:'数列 2, 5, 8, 11, ... で、<b>86</b>から<b>236</b>までに何この数がある？',ans:51,
     hint:'79 − 29 + 1 = 51こ',unit:'こ'},
    // Page 4: Gauss sums
    {q:'1 + 2 + 3 + 4 + 5 = ？',ans:15,
     hint:'（1 + 5）× 5 ÷ 2 = 30 ÷ 2 = 15',unit:''},
    {q:'1 + 2 + 3 + ... + 9 = ？',ans:45,
     hint:'（1 + 9）× 9 ÷ 2 = 90 ÷ 2 = 45',unit:''},
    {q:'2 + 5 + 8 + 11 + 14 + 17（6この和）= ？',ans:57,
     hint:'（2 + 17）× 6 ÷ 2 = 114 ÷ 2 = 57',unit:''},
    {q:'3 + 7 + 11 + 15 + 19 + 23 + 27（7この和）= ？',ans:105,
     hint:'（3 + 27）× 7 ÷ 2 = 210 ÷ 2 = 105',unit:''},
    {q:'1 + 2 + 3 + ... + 100 = ？',ans:5050,
     hint:'（1 + 100）× 100 ÷ 2 = 10100 ÷ 2 = 5050',unit:''},
  ];

  let results=new Array(qs.length).fill(null);

  function render(){
    let html=`<div class="card-title">🎯 クイズ <span class="badge">全${qs.length}問</span></div>`;

    const ok=results.filter(r=>r===true).length;
    const ng=results.filter(r=>r===false).length;
    html+=`<div class="score-bar"><span class="correct">⭕ ${ok}</span><span class="wrong">❌ ${ng}</span><span>／ ${qs.length}問</span></div>`;

    qs.forEach((q,i)=>{
      const rid='qr'+i;
      html+=`<div class="quiz-box">
        <div class="quiz-q">問${i+1}. ${q.q}</div>
        <input class="quiz-input" id="qi${i}" type="number" onkeydown="if(event.key==='Enter')t2check(${i})">
        <span style="font-weight:700;color:#888">${q.unit}</span>
        <button class="quiz-btn" onclick="t2check(${i})">こたえ合わせ</button>
        <div class="quiz-result" id="${rid}"></div>
      </div>`;
    });

    el.innerHTML=html;
  }

  window.t2check=function(i){
    const inp=document.getElementById('qi'+i);
    const res=document.getElementById('qr'+i);
    const v=parseInt(inp.value);
    if(isNaN(v)){res.className='quiz-result ng';res.textContent='数を入れてね！';return;}
    if(v===qs[i].ans){
      res.className='quiz-result ok';
      res.innerHTML='⭕ 正解！ '+qs[i].hint;
      results[i]=true;
    }else{
      res.className='quiz-result ng';
      res.innerHTML='❌ ざんねん… ヒント：'+qs[i].hint;
      results[i]=false;
    }
    // Update score
    const ok=results.filter(r=>r===true).length;
    const ng=results.filter(r=>r===false).length;
    document.querySelector('.score-bar').innerHTML=`<span class="correct">⭕ ${ok}</span><span class="wrong">❌ ${ng}</span><span>／ ${qs.length}問</span>`;
  };

  render();
})();
</script>
